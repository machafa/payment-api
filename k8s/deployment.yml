apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  labels:
    app: payment-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
      - name: payment-api
        # CI/CD pipeline to replace IMAGE_TAG with the actual tag (e.g., latest or commit SHA)
        image: payment-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        
        # Brings the secrets from k8s into the container as env variables
        envFrom:
        - secretRef:
            name: payment-secrets

        # Resource requests and limits to ensure fair resource allocation and prevent noisy neighbor issues
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

        # Health Checks: essencial for availability and reliability.
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10