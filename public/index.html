<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway de Pagamento M-Pesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f8f9fa] flex items-center justify-center min-h-screen p-4">

    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        const ERROR_MAP = {
            'INS-10': 'Pedido de pagamento já enviado e pendente.',
            'INS-6': 'Transacção recusada pelo operador.',
            'INS-2051': 'O número de telefone introduzido é inválido.',
            'INS-2006': 'Saldo insuficiente para realizar o pagamento.',
            'INS-5': 'Serviço M-Pesa temporariamente indisponível.',
        };

        // Otimizado para Monólito: Usa caminhos relativos em produção
        const API_URL = '/api/v1/payments';

        function MpesaPaymentForm() {
            const [phone, setPhone] = React.useState('');
            const [amount, setAmount] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [message, setMessage] = React.useState(null);
            const [paymentId, setPaymentId] = React.useState(null);

            const isValidMpesaNumber = phone.length === 9 && ['4', '5'].includes(phone[1]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isValidMpesaNumber) {
                    setMessage({ type: 'error', text: 'Por favor, introduza um número M-Pesa válido (84 ou 85).' });
                    return;
                }

                setLoading(true);
                setMessage(null);
                setPaymentId(null);

                const fullPhone = '258' + phone;
                const ref = 'TXN_' + Date.now();

                // Mecanismo de Timeout para Produção (25 segundos)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000);

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Idempotency-Key': crypto.randomUUID(),
                        },
                        body: JSON.stringify({
                            amount: parseFloat(amount),
                            currency: 'MZN',
                            method: 'MPESA',
                            customer_msisdn: fullPhone,
                            transaction_reference: ref,
                            third_party_reference: ref,
                        }),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);
                    const data = await res.json();

                    if (res.ok) {
                        setMessage({ 
                            type: 'success', 
                            text: 'Solicitação enviada! Verifique o telemóvel para introduzir o PIN.' 
                        });
                        if (data.payment_id) setPaymentId(data.payment_id);
                        setPhone('');
                        setAmount('');
                    } else {
                        const code = data.code || '';
                        setMessage({ 
                            type: 'error', 
                            text: ERROR_MAP[code] || data.error || 'Não foi possível processar o pagamento.' 
                        });
                    }
                } catch (err) {
                    if (err.name === 'AbortError') {
                        setMessage({ type: 'error', text: 'O pedido demorou demasiado tempo. Verifique se recebeu o prompt no telemóvel.' });
                    } else {
                        setMessage({ type: 'error', text: 'Erro de ligação com o servidor do gateway.' });
                    }
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="bg-white rounded-2xl shadow-2xl border border-gray-100 overflow-hidden">
                    <div class="bg-[#e60000] h-2 w-full"></div>
                    
                    <div class="p-8">
                        <div class="flex flex-col items-center mb-8">
                            <div class="bg-[#e60000] text-white font-bold text-xl px-4 py-1.5 rounded-lg tracking-wide shadow-sm mb-3">
                                m-pesa
                            </div>
                            <h2 class="text-gray-800 text-lg font-semibold tracking-tight">Pagamento por MPesa</h2>
                            <p class="text-gray-400 text-xs mt-1 text-center">Introduza o numero e o valor a pagar</p>
                        </div>

                        {message && (
                            <div class={`p-4 mb-6 rounded-xl text-sm font-medium border ${
                                message.type === 'success' ? 'text-green-700 bg-green-50 border-green-100' : 'text-red-700 bg-red-50 border-red-100'
                            }`}>
                                <div class="flex items-start gap-2.5">
                                    <span class="mt-0.5 font-bold">{message.type === 'success' ? '✓' : '✕'}</span>
                                    <div>{message.text}</div>
                                </div>
                            </div>
                        )}

                        <form onSubmit={handleSubmit} class="space-y-5">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Número de telefone</label>
                                <div class="relative rounded-xl overflow-hidden border border-gray-200 focus-within:border-gray-900 bg-gray-50/50">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-semibold text-sm border-r border-gray-200 pr-3">+258</span>
                                    <input type="tel" maxLength="9" required value={phone} onChange={(e) => setPhone(e.target.value.replace(/\D/g, ''))} class="w-full pl-20 pr-20 py-4 bg-transparent outline-none text-gray-800 font-semibold text-sm placeholder-gray-300 disabled:opacity-50" placeholder="84XXXXXXX" disabled={loading} />
                                    {phone.length > 0 && (
                                        <span class={`absolute right-4 top-1/2 -translate-y-1/2 text-xs font-bold ${isValidMpesaNumber ? 'text-[#4cad26]' : 'text-amber-500'}`}>
                                            {isValidMpesaNumber ? 'Vodacom' : 'Inválido'}
                                        </span>
                                    )}
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Valor a pagar</label>
                                <div class="relative rounded-xl overflow-hidden border border-gray-200 focus-within:border-gray-900 bg-gray-50/50">
                                    <input type="number" step="0.01" min="1" required value={amount} onChange={(e) => setAmount(e.target.value)} class="w-full px-4 py-4 bg-transparent outline-none text-gray-800 font-bold text-lg placeholder-gray-300 disabled:opacity-50" placeholder="0.00" disabled={loading} />
                                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm">MZN</span>
                                </div>
                            </div>

                            <button type="submit" disabled={loading} class="w-full bg-[#e60000] hover:bg-[#cc0000] active:scale-[0.99] text-white py-4 px-6 rounded-xl font-bold tracking-wide shadow-lg shadow-red-100 transition-all duration-150 disabled:opacity-60 disabled:pointer-events-none flex items-center justify-center">
                                {loading ? 'A processar transacção...' : 'Pagar via M-Pesa'}
                            </button>
                        </form>

                        {paymentId && (
                            <div class="mt-6 pt-4 border-t border-gray-100 flex items-center justify-between text-xs text-gray-400 font-mono bg-gray-50 p-2.5 rounded-lg">
                                <span>Ref. Gateway:</span>
                                <span class="font-bold text-gray-600">{paymentId}</span>
                            </div>
                        )}

                       
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MpesaPaymentForm />);
    </script>
</body>
</html>
