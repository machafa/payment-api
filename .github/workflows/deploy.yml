name: CD - Production Deploy

on:
  workflow_run:
    workflows: ["CI - Quality Gates"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Build & Push to K8s
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/payment-api:latest
            ${{ secrets.DOCKER_USERNAME }}/payment-api:${{ github.sha }}

      - name: Setup kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Kubernetes
        run: |
            
            sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/payment-api:${{ github.sha }}|g" k8s/deployment.yaml
            kubectl apply -f k8s/
            if ! kubectl rollout status deployment/payment-api --timeout=300s; then
              echo "Deployment falhou ou demorou demasiado tempo! Iniciando Rollback..."
              kubectl rollout undo deployment/payment-api
              exit 1
            fi
            
            echo "Deploy realizado com sucesso para a versão ${{ github.sha }}"