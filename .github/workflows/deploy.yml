name: CD - Production Deploy

on:

  workflow_run:
    workflows: ["CI - Quality Gates"]
    branches: [main]
    types: [completed]

jobs:

  deploy:
    name: Build & Push to Docker Hub
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5

        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/payment-api:latest
            ${{ secrets.DOCKER_USERNAME }}/payment-api:${{ github.sha }}

      - name: Deploy summary
        run: |
          echo "Imagem publicada com sucesso no Docker Hub"
          echo "Imagem: ${{ secrets.DOCKER_USERNAME }}/payment-api:${{ github.sha }}"
          echo "Para deploy em Kubernetes: kubectl apply -f k8s/"