name: CD - Production Deploy

on:
  workflow_run:
    workflows: ["CI - Quality Gates"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Build & Push to K8s
    # Só executa se o workflow de CI passou com sucesso
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Usando o seu usuário do Docker Hub (ex: machafa)
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/payment-api:latest
            ${{ secrets.DOCKER_USERNAME }}/payment-api:${{ github.sha }}

      - name: Setup kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Kubernetes
        run: |
          # Atualiza o deployment com a imagem que tem a TAG única do commit (SHA)
          kubectl set image deployment/payment-api payment-api=${{ secrets.DOCKER_USERNAME }}/payment-api:${{ github.sha }}
          kubectl rollout status deployment/payment-api